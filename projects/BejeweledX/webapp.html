<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Bejeweled X</title>
		<meta name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="description" content="A faithful web revival of the classic Bejeweled 2." />
		<meta name="theme-color" content="#0a1740" />

		<!-- PWA / Add to Home Screen: launches chrome-free in standalone mode -->
		<link rel="manifest" href="manifest.webmanifest" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Bejeweled X" />
		<link rel="apple-touch-icon" href="BejeweledX_icon.svg" />
		<link rel="icon" href="BejeweledX_icon.svg" type="image/svg+xml" />

		<link rel="stylesheet" href="assets/css/effects.css" />
		<style>
			/* Standalone app shell — the game owns the whole viewport. No theme CSS
			   or scroll scripts are loaded here, which is what keeps it smooth on
			   mobile compared with the full project page. */
			html, body {
				margin: 0;
				height: 100%;
				/* #bj-frame is transparent here (see below), so this is what shows in
				   the letterbox gutter around the canvas — including the iOS standalone
				   home-indicator strip below the (clipped) fixed frame. Use the game's
				   own background art, cover-cropped at native resolution, instead of a
				   flat color, so the gutter reads as part of the scene rather than a
				   solid bar. #0a1740 is the fallback if the image fails to load. */
				background: #0a1740 url("assets/img/background.jpg") center / cover no-repeat;
				overflow: hidden;
				overscroll-behavior: none;
				-webkit-tap-highlight-color: transparent;
			}
			#bj-stage {
				/* Fills the layout viewport and centers #bj-frame within it. iOS
				   standalone clips fixed elements to ABOVE the home indicator; the
				   strip below is painted by the body background (coloured to match
				   the game). This has to live on #bj-stage rather than #bj-frame:
				   #bj-frame shrink-wraps to the canvas (so the icon buttons, which
				   are absolutely positioned against it, land on the canvas's actual
				   corner) — stretching #bj-frame to the full viewport would instead
				   pin the buttons to the screen's corner, floating away from the
				   board whenever the canvas is letterboxed. */
				position: fixed;
				inset: 0;
				height: 100%;
				justify-content: center;
			}
			#bj-frame {
				/* Transparent so it shows no colour band behind Safari's toolbars
				   in the browser, and no rounded "card" look in true fullscreen. */
				max-width: none;
				border-radius: 0;
				background: transparent;
				box-shadow: none;
			}
			#bj-canvas {
				display: block;
				touch-action: none;
			}
		</style>
	</head>

	<body class="bj-app">
		<div id="bj-stage">
			<div id="bj-frame">
				<canvas id="bj-canvas" width="512" height="600"
					aria-label="Bejeweled X game canvas"></canvas>

				<!-- Game Mode button -->
				<button class="bj-icon-btn bj-gamemode" id="bj-gamemode" aria-label="Game Mode">
					<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
						<path d="M17.5 6h-11C4.57 6 3 7.57 3 9.5v5C3 16.43 4.57 18 6.5 18c1.06 0 2.02-.47 2.67-1.25L10.5 15h3l1.33 1.75c.65.78 1.61 1.25 2.67 1.25 1.93 0 3.5-1.57 3.5-3.5v-5C21 7.57 19.43 6 17.5 6zM11 12H9.5v1.5H8V12H6.5v-1.5H8V9h1.5v1.5H11V12zm4.25 1.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm2.5-3.5a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/>
					</svg>
				</button>

				<!-- Settings gear button -->
				<button class="bj-icon-btn bj-gear" id="bj-gear" aria-label="Settings">
					<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
						<path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.3.07-.62.07-.95s-.03-.66-.07-1l2.18-1.7c.2-.16.25-.44.12-.66l-2.06-3.58c-.13-.22-.39-.3-.62-.22l-2.57 1.03c-.54-.42-1.12-.76-1.75-.99l-.39-2.73C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.39 2.73c-.63.23-1.21.57-1.75.99L4.79 5.11c-.23-.09-.49 0-.62.22L2.11 8.91c-.13.22-.07.5.12.66l2.18 1.7c-.04.34-.07.67-.07 1s.03.65.07.95l-2.18 1.73c-.19.16-.24.44-.12.66l2.06 3.58c.13.22.39.3.62.22l2.57-1.03c.54.42 1.12.76 1.75.99l.39 2.73c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.39-2.73c.63-.23 1.21-.57 1.75-.99l2.57 1.03c.23.09.49 0 .62-.22l2.06-3.58c.13-.22.07-.5-.12-.66l-2.18-1.73z"/>
					</svg>
				</button>

				<!-- Settings overlay -->
				<div class="bj-settings-overlay" id="bj-settings-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">OPTIONS</div>

						<div class="bj-setting-row">
							<span class="bj-setting-label">Sound</span>
							<div class="bj-sound-controls">
								<input type="range" class="bj-volume-slider" id="bj-volume-slider" min="0" max="150" value="100">
								<label class="bj-toggle-wrap">
									<input type="checkbox" class="bj-toggle" id="bj-sound-toggle" checked>
									<span class="bj-switch"></span>
								</label>
							</div>
						</div>

						<label class="bj-setting-row">
							<span class="bj-setting-label">Haptics</span>
							<input type="checkbox" class="bj-toggle" id="bj-haptics-toggle" checked>
							<span class="bj-switch"></span>
						</label>

						<label class="bj-setting-row">
							<span class="bj-setting-label">FPS Counter</span>
							<input type="checkbox" class="bj-toggle" id="bj-fps-toggle">
							<span class="bj-switch"></span>
						</label>

						<label class="bj-setting-row">
							<span class="bj-setting-label">Debug Mode</span>
							<input type="checkbox" class="bj-toggle" id="bj-debug-toggle">
							<span class="bj-switch"></span>
						</label>

						<!-- Timed/Rush mode only: a zero-latency "bot" that always plays a legal
							 move the instant one exists (still at normal swap speed), preferring
							 whichever move detonates/collects a power gem or Timer buff. Hidden
							 outside Timed/Rush mode. -->
						<label class="bj-setting-row" id="bj-autoplay-row">
							<span class="bj-setting-label">Auto-Play</span>
							<input type="checkbox" class="bj-toggle" id="bj-autoplay-toggle">
							<span class="bj-switch"></span>
						</label>

						<div class="bj-setting-row" style="justify-content:center">
							<button class="bj-settings-close bj-reset" id="bj-reset-best">Reset Best Score</button>
						</div>

						<button class="bj-settings-close bj-resume" id="bj-settings-close">RESUME</button>
						<div class="bj-version" id="bj-version"></div>
					</div>
				</div>

				<!-- Game Mode overlay -->
				<div class="bj-settings-overlay" id="bj-gamemode-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">GAME MODE</div>

						<div class="bj-mode-list">
							<button class="bj-mode-btn" id="bj-mode-endless" data-mode="endless"
								data-desc="Classic play, clear gems, level up, no limit.">
								<span class="bj-mode-name">Endless</span>
							</button>
							<button class="bj-mode-btn" id="bj-mode-timed" data-mode="timed"
								data-desc="One minute per level, clear it before the clock runs out.">
								<span class="bj-mode-name">Timed</span>
							</button>
							<button class="bj-mode-btn" id="bj-mode-rush" data-mode="rush"
								data-desc="15 seconds on the clock, quick matches earn time back 1-3s, levels add 5s.">
								<span class="bj-mode-name">Rush</span>
							</button>
							<button class="bj-mode-btn" id="bj-mode-treasure" data-mode="treasure"
								data-desc="A treasure hides under one tile. Blast or match over it within a minute to find the chest!">
								<span class="bj-mode-name">Treasure Hunt</span>
							</button>
							<button class="bj-mode-btn" disabled>
								<span class="bj-mode-name">Puzzle</span>
								<span class="bj-mode-desc">Coming soon</span>
							</button>
							<button class="bj-mode-btn" disabled>
								<span class="bj-mode-name">Lightning</span>
								<span class="bj-mode-desc">Coming soon</span>
							</button>
						</div>

						<button class="bj-settings-close bj-resume" id="bj-gamemode-close">RESUME</button>
					</div>
				</div>

				<!-- Mode-selected toast: brief description popup shown after picking a mode -->
				<div class="bj-mode-toast" id="bj-mode-toast">
					<div class="bj-mode-toast-name" id="bj-mode-toast-name"></div>
					<div class="bj-mode-toast-desc" id="bj-mode-toast-desc"></div>
				</div>

				<!-- Timed mode: shown when the 1-minute clock runs out -->
				<div class="bj-settings-overlay" id="bj-timeup-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">TIME'S UP!</div>

						<div class="bj-timeup-stats">
							<div class="bj-timeup-row">
								<span>Level reached</span>
								<span id="bj-timeup-level">1</span>
							</div>
							<div class="bj-timeup-row">
								<span>Score</span>
								<span id="bj-timeup-score">0</span>
							</div>
						</div>

						<button class="bj-settings-close bj-resume" id="bj-timeup-retry">TRY AGAIN</button>
					</div>
				</div>

				<!-- Shown at boot when a saved in-progress run is found: pick up where it left
					 off, or discard it and deal a fresh board. -->
				<div class="bj-settings-overlay" id="bj-resume-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">WELCOME BACK</div>

						<div class="bj-timeup-stats">
							<div class="bj-timeup-row">
								<span>Level</span>
								<span id="bj-resume-level">1</span>
							</div>
							<div class="bj-timeup-row">
								<span>Score</span>
								<span id="bj-resume-score">0</span>
							</div>
						</div>

						<button class="bj-settings-close bj-resume" id="bj-resume-continue">CONTINUE</button>
						<button class="bj-settings-close bj-reset" id="bj-resume-restart">START OVER</button>
					</div>
				</div>

			</div>
		</div>

		<!-- game (no theme scripts: this is the lean, fast app build) -->
		<script src="assets/js/bejeweled_assets.js"></script>
		<script src="assets/js/BejeweledX.js"></script>
		<script>
			// Register the service worker so the app is installable and loads its
			// assets from cache (faster, and works offline once visited).
			if ("serviceWorker" in navigator) {
				window.addEventListener("load", function () {
					navigator.serviceWorker.register("sw.js").catch(function () {});
				});
			}
		</script>
	</body>
</html>
