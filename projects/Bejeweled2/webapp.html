<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Bejeweled 2</title>
		<meta name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="description" content="A faithful web revival of the classic Bejeweled 2." />
		<meta name="theme-color" content="#0a1740" />

		<!-- PWA / Add to Home Screen: launches chrome-free in standalone mode -->
		<link rel="manifest" href="manifest.webmanifest" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Bejeweled 2" />
		<link rel="apple-touch-icon" href="Bejeweled2_icon.svg" />
		<link rel="icon" href="Bejeweled2_icon.svg" type="image/svg+xml" />

		<link rel="stylesheet" href="assets/css/effects.css" />
		<style>
			/* Standalone app shell — the game owns the whole viewport. No theme CSS
			   or scroll scripts are loaded here, which is what keeps it smooth on
			   mobile compared with the full project page. */
			html, body {
				margin: 0;
				height: 100%;
				/* iOS standalone paints this root background in the home-indicator
				   strip below the (clipped) fixed frame. Match it to the game's deep
				   cosmic background so that strip blends in instead of showing black. */
				background: #0a1740;
				overflow: hidden;
				overscroll-behavior: none;
				-webkit-tap-highlight-color: transparent;
			}
			#bj-frame {
				/* Fills the layout viewport. iOS standalone clips fixed elements to
				   ABOVE the home indicator; the strip below is painted by the body
				   background (coloured to match the game). Transparent so it shows
				   no colour band behind Safari's toolbars in the browser. */
				position: fixed;
				inset: 0;
				max-width: none;
				border-radius: 0;
				background: transparent;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#bj-canvas {
				display: block;
				touch-action: none;
			}
		</style>
	</head>

	<body class="bj-app">
		<div id="bj-stage">
			<div id="bj-frame">
				<canvas id="bj-canvas" width="512" height="600"
					aria-label="Bejeweled 2 game canvas"></canvas>

				<!-- Game Mode button -->
				<button class="bj-icon-btn bj-gamemode" id="bj-gamemode" aria-label="Game Mode">
					<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
						<path d="M17.5 6h-11C4.57 6 3 7.57 3 9.5v5C3 16.43 4.57 18 6.5 18c1.06 0 2.02-.47 2.67-1.25L10.5 15h3l1.33 1.75c.65.78 1.61 1.25 2.67 1.25 1.93 0 3.5-1.57 3.5-3.5v-5C21 7.57 19.43 6 17.5 6zM11 12H9.5v1.5H8V12H6.5v-1.5H8V9h1.5v1.5H11V12zm4.25 1.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm2.5-3.5a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/>
					</svg>
				</button>

				<!-- Settings gear button -->
				<button class="bj-icon-btn bj-gear" id="bj-gear" aria-label="Settings">
					<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
						<path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.3.07-.62.07-.95s-.03-.66-.07-1l2.18-1.7c.2-.16.25-.44.12-.66l-2.06-3.58c-.13-.22-.39-.3-.62-.22l-2.57 1.03c-.54-.42-1.12-.76-1.75-.99l-.39-2.73C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.39 2.73c-.63.23-1.21.57-1.75.99L4.79 5.11c-.23-.09-.49 0-.62.22L2.11 8.91c-.13.22-.07.5.12.66l2.18 1.7c-.04.34-.07.67-.07 1s.03.65.07.95l-2.18 1.73c-.19.16-.24.44-.12.66l2.06 3.58c.13.22.39.3.62.22l2.57-1.03c.54.42 1.12.76 1.75.99l.39 2.73c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.39-2.73c.63-.23 1.21-.57 1.75-.99l2.57 1.03c.23.09.49 0 .62-.22l2.06-3.58c.13-.22.07-.5-.12-.66l-2.18-1.73z"/>
					</svg>
				</button>

				<!-- Settings overlay -->
				<div class="bj-settings-overlay" id="bj-settings-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">OPTIONS</div>

						<label class="bj-setting-row">
							<span class="bj-setting-label">Sound</span>
							<input type="checkbox" class="bj-toggle" id="bj-sound-toggle" checked>
							<span class="bj-switch"></span>
						</label>

						<label class="bj-setting-row">
							<span class="bj-setting-label">FPS Counter</span>
							<input type="checkbox" class="bj-toggle" id="bj-fps-toggle" checked>
							<span class="bj-switch"></span>
						</label>

						<label class="bj-setting-row">
							<span class="bj-setting-label">Debug Mode</span>
							<input type="checkbox" class="bj-toggle" id="bj-debug-toggle">
							<span class="bj-switch"></span>
						</label>

						<div class="bj-setting-row" style="justify-content:center">
							<button class="bj-settings-close bj-reset" id="bj-reset-best">Reset Best Score</button>
						</div>

						<button class="bj-settings-close bj-resume" id="bj-settings-close">RESUME</button>
					</div>
				</div>

				<!-- Game Mode overlay (placeholder panel; modes to be added) -->
				<div class="bj-settings-overlay" id="bj-gamemode-overlay">
					<div class="bj-settings-panel">
						<div class="bj-settings-title">GAME MODE</div>

						<button class="bj-settings-close bj-resume" id="bj-gamemode-close">RESUME</button>
					</div>
				</div>

			</div>
		</div>

		<!-- game (no theme scripts: this is the lean, fast app build) -->
		<script src="assets/js/bejeweled_assets.js"></script>
		<script src="assets/js/Bejeweled2.js"></script>
		<script>
			// Register the service worker so the app is installable and loads its
			// assets from cache (faster, and works offline once visited).
			if ("serviceWorker" in navigator) {
				window.addEventListener("load", function () {
					navigator.serviceWorker.register("sw.js").catch(function () {});
				});
			}
		</script>
	</body>
</html>
